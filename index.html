<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jemputan Mejar Azri & Cikgu Sha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline class="big-video-bg">
        <source src="video2.mp4" type="video/mp4">
    </video>

    <div class="main-wrapper">
        <div class="scroll-stack" id="scrollStack">
            
            <div class="page active" id="page1" onclick="handlePageClick(0)" style="background-image: url('page1-bg.png');">
                <video autoplay muted loop playsinline class="first-video-cover" id="coverVideo"></video>
                <script>document.getElementById('coverVideo').src = "video1.mp4";</script>

                <div class="nav-container split-nav">
                    <span class="btn-small-nav" id="btnBackVideo" onclick="resetVideo(event)" style="display:none;">← Video</span>
                    <span class="btn-small-nav next-btn" onclick="nextPage(0, event)">Seterusnya →</span>
                </div>

                <div class="content">
                    <div class="countdown-grid">
                        <div class="pie-item"><div class="pie" id="pieD"><div class="val" id="valD">0</div></div><span>Hari</span></div>
                        <div class="pie-item"><div class="pie" id="pieH"><div class="val" id="valH">0</div></div><span>Jam</span></div>
                        <div class="pie-item"><div class="pie" id="pieM"><div class="val" id="valM">0</div></div><span>Min</span></div>
                        <div class="pie-item"><div class="pie" id="pieS"><div class="val" id="valS">0</div></div><span>Saat</span></div>
                    </div>
                </div>
            </div>

            <div class="page next-page" style="background-image: url('page2-text.png');">
                <div class="nav-container split-nav">
                    <span class="btn-small-nav" onclick="prevPage(1)">← Kembali</span>
                    <span class="btn-small-nav next-btn" onclick="nextPage(1)">Seterusnya →</span>
                </div>
            </div>

            <div class="page next-page" style="background-image: url('page3-text.png');">
                <div class="nav-container split-nav">
                    <span class="btn-small-nav" onclick="prevPage(2)">← Kembali</span>
                    <span class="btn-small-nav next-btn" onclick="nextPage(2)">Seterusnya →</span>
                </div>
                
                <div id="page3-content" class="content">
                    <div class="map-grid-boxed">
                        <a href="https://waze.com/ul/hw23p9e66v" target="_blank" class="map-box-item">WAZE</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=PT+7065+Kg+Baru+Beris+Lalang+Bachok+Kelantan" target="_blank" class="map-box-item">GOOGLE MAPS</a>
                    </div>
                </div>
            </div>

            <div class="page next-page" style="background-image: url('page4-text.png');">
                <div class="nav-container split-nav">
                    <span class="btn-small-nav" onclick="prevPage(3)">← Kembali</span>
                    <span class="btn-small-nav next-btn" onclick="nextPage(3)">Seterusnya →</span>
                </div>
                
                <div id="page4-content" class="content">
                    <form id="rsvpForm" class="rsvp-stacked-form">
                        <input type="text" name="name" placeholder="Nama Penuh" required class="rsvp-input">
                        <div class="rsvp-options-stacked">
                            <label class="radio-card-stacked"><input type="radio" name="attendance" value="Hadir" required><span>Hadir ✅</span></label>
                            <label class="radio-card-stacked"><input type="radio" name="attendance" value="Tidak Hadir" required><span>Tidak Hadir ❌</span></label>
                        </div>
                        <input type="number" name="pax" min="1" max="20" placeholder="Bilangan Hadir" required class="rsvp-input">
                        <button type="submit" id="submitBtn">Hantar RSVP 🕊️</button>
                    </form>
                </div>
            </div>

            <div class="page next-page" style="background-image: url('page-bg.jpg');">
                <div class="nav-container split-nav">
                    <span class="btn-small-nav" onclick="prevPage(4)">← Kembali</span>
                </div>
                
                <div id="page5-content" class="content">
                    <div class="live-ucapan-box">
                        <p class="label-tiny gold-text" style="font-size: 0.6rem; text-align: center;">📜 DIGITAL GUESTBOOK</p>
                        <div class="ucapan-list" id="displayUcapan">Memuatkan...</div>
                        <div class="input-ucapan-row">
                            <input type="text" id="inputNama" placeholder="Nama">
                            <input type="text" id="inputMesej" placeholder="Ucapan...">
                            <button onclick="sendUcapan()" id="btnUcapan">Hantar</button>
                        </div>
                    </div>
                    
                    <div class="contact-grid-neat">
                        <p class="label-tiny gold-text" style="margin-bottom: 5px; text-align: center;">📞 HUBUNGI:</p>
                        <a href="tel:0199126658" class="contact-item">
                            <span class="black-phone">019-9126658</span>
                            <span class="label-tiny gold-text" style="font-size: 0.6rem;">(Mejar Azri)</span>
                        </a>
                        <a href="tel:0199199658" class="contact-item">
                            <span class="black-phone">019-9199658</span>
                            <span class="label-tiny gold-text" style="font-size: 0.6rem;">(Cikgu Sha)</span>
                        </a>
                    </div>

                    <div class="closing-section">
                        <h1 class="times-italic gold-glow" style="color: var(--gold); font-size: 2.2rem;">Terima Kasih</h1>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="music-control" onclick="toggleMusic()"><span id="musicIcon">🎵</span></div>
    <audio id="rayaSong" loop preload="auto"><source src="serumpun.mp3" type="audio/mpeg"></audio>

    <script>
        const pages = document.querySelectorAll('.page');
        const mySong = document.getElementById('rayaSong');
        const musicIcon = document.getElementById('musicIcon');
        
        // GANTI LINK SCRIPTURL AUNT SHA KAT SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwWxKI3H8DdZKfwL21B-V47o-xGiO7uZjOT-fBppYY-sQ5K2PCjIBSorlZD2nGZsaPwVg/exec';
        
        let videoOpen = false;

        function handlePageClick(index) { if (index === 0 && !videoOpen) showContent(); }
        function showContent() {
            const coverVideo = document.getElementById('coverVideo');
            const btnBack = document.getElementById('btnBackVideo');
            if (coverVideo && !videoOpen) {
                coverVideo.style.opacity = '0';
                coverVideo.style.pointerEvents = 'none';
                setTimeout(() => { btnBack.style.display = 'block'; }, 600);
                videoOpen = true;
                if (mySong && mySong.paused) { mySong.play().catch(e => {}); musicIcon.innerText = "🔇"; }
            }
        }
        function resetVideo(event) {
            event.stopPropagation();
            const coverVideo = document.getElementById('coverVideo');
            const btnBack = document.getElementById('btnBackVideo');
            coverVideo.style.opacity = '1'; coverVideo.style.pointerEvents = 'auto';
            btnBack.style.display = 'none'; videoOpen = false;
        }
        function nextPage(index, event) {
            if (event) event.stopPropagation();
            if (index === 0 && !videoOpen) { showContent(); return; }
            if (index < pages.length - 1) {
                pages[index].classList.remove('active'); pages[index].classList.add('flipped');
                pages[index+1].classList.remove('next-page'); pages[index+1].classList.add('active');
            }
        }
        function prevPage(index) {
            if (index > 0) {
                pages[index].classList.remove('active'); pages[index].classList.add('next-page');
                pages[index-1].classList.remove('flipped'); pages[index-1].classList.add('active');
            }
        }
        function toggleMusic() { if (mySong.paused) { mySong.play(); musicIcon.innerText = "🔇"; } else { mySong.pause(); musicIcon.innerText = "🎵"; } }
        
        function fetchUcapan() { fetch(scriptURL).then(res => res.json()).then(data => { const box = document.getElementById('displayUcapan'); if(!data || data.length === 0) box.innerHTML = "Belum ada ucapan..."; else box.innerHTML = data.map(u => `<div class="ucapan-item"><b>${u.nama}:</b> ${u.mesej}</div>`).join(''); }); }
        
        function sendUcapan() { 
            const nama = document.getElementById('inputNama').value, mesej = document.getElementById('inputMesej').value; 
            if(!nama || !mesej) return; 
            const btn = document.getElementById('btnUcapan'); btn.disabled = true; 
            const fd = new FormData(); fd.append("type", "ucapan"); fd.append("nama", nama); fd.append("mesej", mesej); 
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: fd}).then(() => { document.getElementById('inputNama').value = ''; document.getElementById('inputMesej').value = ''; btn.disabled = false; setTimeout(fetchUcapan, 1500); }); 
        }

        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Menghantar...";
            const fd = new FormData(this); fd.append("type", "rsvp");
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: fd}).then(() => {
                alert("Terima kasih! RSVP anda telah berjaya dihantar.");
                this.reset(); btn.disabled = false; btn.innerText = "Hantar RSVP 🕊️";
            });
        });

        // COUNTDOWN DATE
        const targetDate = new Date("May 29, 2026 11:00:00").getTime();
        setInterval(() => {
            const diff = targetDate - new Date().getTime();
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            const u = {D:[d,100], H:[h,24], M:[m,60], S:[s,60]};
            for (const k in u) { if(document.getElementById(`val${k}`)){ document.getElementById(`val${k}`).innerText = Math.max(0, u[k][0]); const deg = (Math.max(0, u[k][0])/u[k][1])*360; document.getElementById(`pie${k}`).style.background = `conic-gradient(#d4a5a5 ${deg}deg, #eee 0deg)`; } }
        }, 1000);

        window.onload = fetchUcapan;
    </script>
</body>
</html>
